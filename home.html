<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIS Golf Club</title>
<link rel="icon" type="image/png" href="/TIS/icon-192.png">
<link rel="apple-touch-icon" href="/TIS/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a1f10">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=IBM+Plex+Mono:wght@300;400;500&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}

:root{
  --green-deep:#0a1f10;
  --green-dark:#1a4a2a;
  --green-mid:#2c6e3f;
  --green-light:#4a9e65;
  --gold:#c9a830;
  --gold-light:#e8c96a;
  --cream:#fffdf5;
  --text-light:rgba(255,255,255,.92);
  --text-muted:rgba(255,255,255,.55);
}

html,body{
  height:100%;
  overflow:hidden;
}

body{
  font-family:'Sarabun',sans-serif;
  background:var(--green-deep);
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  position:relative;
}

/* ── Background logo watermark ── */
.bg-logo{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  pointer-events:none;
  z-index:0;
  overflow:hidden;
}
.bg-logo img{
  width:min(85vw,85vh);
  height:min(85vw,85vh);
  object-fit:contain;
  opacity:.10;
  filter:grayscale(30%) brightness(1.4);
  animation:slowPulse 8s ease-in-out infinite;
}
@keyframes slowPulse{
  0%,100%{opacity:.10;transform:scale(1);}
  50%{opacity:.14;transform:scale(1.02);}
}

/* ── Radial vignette overlay ── */
.vignette{
  position:fixed;
  inset:0;
  background:radial-gradient(ellipse 70% 70% at 50% 50%,transparent 20%,rgba(10,31,16,.65) 100%);
  z-index:1;
  pointer-events:none;
}

/* ── Decorative gold lines ── */
.deco-top,.deco-bottom{
  position:fixed;
  left:50%;
  transform:translateX(-50%);
  z-index:2;
  pointer-events:none;
  display:flex;
  align-items:center;
  gap:14px;
  white-space:nowrap;
}
.deco-top{top:28px;}
.deco-bottom{bottom:28px;}
.deco-line{width:80px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.deco-text{
  font-family:'IBM Plex Mono',monospace;
  font-size:9px;
  letter-spacing:3px;
  text-transform:uppercase;
  color:var(--gold);
  opacity:.7;
}

/* ── Main container ── */
.container{
  position:relative;
  z-index:10;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:0;
  animation:fadeUp .7s ease both;
  padding:24px 16px;
  width:100%;
  max-width:480px;
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

/* ── Logo ── */
.logo-wrap{
  margin-bottom:22px;
  position:relative;
}
.logo-wrap::before{
  content:'';
  position:absolute;
  inset:-14px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(201,168,48,.18) 0%,transparent 70%);
  animation:glow 4s ease-in-out infinite;
}
@keyframes glow{
  0%,100%{opacity:.6;}50%{opacity:1;}
}
.logo-img{
  width:100px;
  height:100px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid rgba(201,168,48,.4);
  box-shadow:0 0 40px rgba(201,168,48,.15),0 8px 32px rgba(0,0,0,.5);
  display:block;
  position:relative;
  z-index:1;
}

/* ── Title ── */
.club-name{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(28px,6vw,38px);
  font-weight:600;
  color:var(--text-light);
  letter-spacing:.04em;
  text-align:center;
  line-height:1.15;
  margin-bottom:4px;
}
.club-sub{
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;
  letter-spacing:3.5px;
  text-transform:uppercase;
  color:var(--gold);
  opacity:.85;
  text-align:center;
  margin-bottom:36px;
}

/* ── Divider ── */
.divider{
  display:flex;
  align-items:center;
  gap:12px;
  width:100%;
  max-width:320px;
  margin-bottom:36px;
}
.div-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,48,.35),transparent);}
.div-diamond{
  width:6px;height:6px;
  background:var(--gold);
  transform:rotate(45deg);
  opacity:.7;
  flex-shrink:0;
}

/* ── Buttons ── */
.btn-group{
  display:flex;
  flex-direction:column;
  gap:14px;
  width:100%;
  max-width:340px;
}

.nav-btn{
  position:relative;
  display:flex;
  align-items:center;
  gap:14px;
  padding:18px 24px;
  border-radius:12px;
  text-decoration:none;
  cursor:pointer;
  border:none;
  width:100%;
  overflow:hidden;
  transition:transform .2s ease,box-shadow .2s ease;
  animation:fadeUp .7s ease both;
}
.nav-btn:nth-child(1){animation-delay:.1s;}
.nav-btn:nth-child(2){animation-delay:.2s;}

.nav-btn::before{
  content:'';
  position:absolute;
  inset:0;
  opacity:0;
  transition:opacity .2s ease;
}
.nav-btn:hover{transform:translateY(-2px);}
.nav-btn:active{transform:translateY(0);}

/* Register Members */
.btn-register{
  background:linear-gradient(135deg,rgba(201,168,48,.12),rgba(201,168,48,.06));
  border:1px solid rgba(201,168,48,.35);
  box-shadow:0 4px 20px rgba(0,0,0,.3),inset 0 1px 0 rgba(201,168,48,.12);
}
.btn-register::before{background:linear-gradient(135deg,rgba(201,168,48,.08),transparent);}
.btn-register:hover{box-shadow:0 8px 32px rgba(0,0,0,.4),0 0 24px rgba(201,168,48,.12),inset 0 1px 0 rgba(201,168,48,.15);}
.btn-register:hover::before{opacity:1;}

/* Tournament */
.btn-tourney{
  background:linear-gradient(135deg,rgba(44,110,63,.35),rgba(26,74,42,.5));
  border:1px solid rgba(74,158,101,.3);
  box-shadow:0 4px 20px rgba(0,0,0,.35),inset 0 1px 0 rgba(74,158,101,.12);
}
.btn-tourney::before{background:linear-gradient(135deg,rgba(44,110,63,.2),transparent);}
.btn-tourney:hover{box-shadow:0 8px 32px rgba(0,0,0,.45),0 0 24px rgba(44,110,63,.2),inset 0 1px 0 rgba(74,158,101,.2);}
.btn-tourney:hover::before{opacity:1;}

.btn-icon{
  width:44px;height:44px;
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;
  flex-shrink:0;
  position:relative;z-index:1;
}
.btn-register .btn-icon{background:rgba(201,168,48,.15);}
.btn-tourney  .btn-icon{background:rgba(44,110,63,.4);}

.btn-texts{
  flex:1;
  text-align:left;
  position:relative;z-index:1;
}
.btn-title{
  font-family:'Cormorant Garamond',serif;
  font-size:18px;
  font-weight:600;
  color:var(--text-light);
  line-height:1.2;
  display:block;
}
.btn-desc{
  font-family:'IBM Plex Mono',monospace;
  font-size:9.5px;
  letter-spacing:1.2px;
  text-transform:uppercase;
  margin-top:3px;
  display:block;
}
.btn-register .btn-desc{color:rgba(201,168,48,.7);}
.btn-tourney  .btn-desc{color:rgba(74,158,101,.8);}

.btn-arrow{
  font-size:18px;
  opacity:.5;
  transition:opacity .2s,transform .2s;
  position:relative;z-index:1;
  color:var(--text-light);
}
.nav-btn:hover .btn-arrow{opacity:.9;transform:translateX(4px);}

/* ── Footer note ── */
.footer-note{
  margin-top:32px;
  font-family:'IBM Plex Mono',monospace;
  font-size:9px;
  letter-spacing:1.5px;
  text-transform:uppercase;
  color:var(--text-muted);
  text-align:center;
}

/* ── Floating particles ── */
.particles{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:1;
  overflow:hidden;
}
.particle{
  position:absolute;
  width:2px;height:2px;
  border-radius:50%;
  background:var(--gold);
  opacity:0;
  animation:float linear infinite;
}
@keyframes float{
  0%{transform:translateY(100vh) translateX(0);opacity:0;}
  10%{opacity:.4;}
  90%{opacity:.15;}
  100%{transform:translateY(-20px) translateX(var(--dx));opacity:0;}
}

</style>
</head>
<body>

<!-- Background logo -->
<div class="bg-logo">
  <img src="/TIS/icon-192.png" alt="TIS Golf Club Logo" id="bgLogoImg">
</div>

<!-- Vignette -->
<div class="vignette"></div>

<!-- Floating particles -->
<div class="particles" id="particles"></div>

<!-- Deco lines -->
<div class="deco-top">
  <div class="deco-line"></div>
  <div class="deco-text">Tri Petch Group</div>
  <div class="deco-line"></div>
</div>
<div class="deco-bottom">
  <div class="deco-line"></div>
  <div class="deco-text">Est. Golf Club</div>
  <div class="deco-line"></div>
</div>

<!-- Main -->
<div class="container">
  <!-- Logo -->
  <div class="logo-wrap">
    <img src="/TIS/icon-192.png" alt="TIS Golf Club" class="logo-img" id="logoImg">
  </div>

  <!-- Title -->
  <div class="club-name">TIS Golf Club</div>
  <div class="club-sub">Tri Petch Group · Members Portal</div>

  <!-- Divider -->
  <div class="divider">
    <div class="div-line"></div>
    <div class="div-diamond"></div>
    <div class="div-line"></div>
  </div>

  <!-- Navigation buttons -->
  <div class="btn-group">

    <a href="members.html" class="nav-btn btn-register">
      <div class="btn-icon">👤</div>
      <div class="btn-texts">
        <span class="btn-title">Register Members</span>
        <span class="btn-desc">สมัครสมาชิก · จัดการข้อมูล</span>
      </div>
      <span class="btn-arrow">›</span>
    </a>

    <a href="index.html" class="nav-btn btn-tourney">
      <div class="btn-icon">⛳</div>
      <div class="btn-texts">
        <span class="btn-title">Tournaments</span>
        <span class="btn-desc">บันทึกสกอร์ · ตารางคะแนน</span>
      </div>
      <span class="btn-arrow">›</span>
    </a>

  </div>

  <div class="footer-note">TIS Golf Club · Tri Petch Group</div>
</div>

<script>
// Generate floating particles
const container = document.getElementById('particles');
for(let i = 0; i < 18; i++){
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.cssText = `
    left:${Math.random()*100}%;
    --dx:${(Math.random()-0.5)*120}px;
    animation-duration:${8+Math.random()*14}s;
    animation-delay:${Math.random()*12}s;
    opacity:0;
    width:${1+Math.random()*1.5}px;
    height:${1+Math.random()*1.5}px;
  `;
  container.appendChild(p);
}

// Fallback for logo if /TIS path not available
document.querySelectorAll('img').forEach(img=>{
  img.onerror = function(){
    if(this.id==='bgLogoImg'){
      this.style.display='none';
    } else if(this.id==='logoImg'){
      this.style.background='linear-gradient(135deg,#1a4a2a,#2c6e3f)';
      this.style.display='flex';
      this.style.alignItems='center';
      this.style.justifyContent='center';
      this.outerHTML=`<div style="width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,#1a4a2a,#2c6e3f);border:2px solid rgba(201,168,48,.4);display:flex;align-items:center;justify-content:center;font-size:40px;">⛳</div>`;
    }
  };
});
</script>
</body>
</html>
